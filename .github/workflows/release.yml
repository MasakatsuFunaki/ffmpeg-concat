name: Create Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip install folders
        run: |
          cd install
          if [ -d linux ]; then
            zip -r ../ffmpeg-tools-linux.zip linux/
          fi
          if [ -d win ]; then
            zip -r ../ffmpeg-tools-windows.zip win/
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ffmpeg-tools-linux.zip
            ffmpeg-tools-windows.zip
          generate_release_notes: true
